<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Réviséa</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
min-height:100vh;
padding:20px;
}

.logo{
position:fixed;
top:15px;
left:15px;
width:100px;
height:100px;
border-radius:50%;
background:linear-gradient(135deg,#ffffff,#888888);
display:flex;
justify-content:center;
align-items:center;
text-align:center;
font-weight:900;
font-size:14px;
color:black;
cursor:pointer;
box-shadow:0 0 25px rgba(255,255,255,0.25);
z-index:1000;
}

.calc-btn{
position:fixed;
top:25px;
right:20px;
padding:15px 25px;
border:none;
border-radius:20px;
font-weight:bold;
cursor:pointer;
background:white;
}

.container{
width:100%;
max-width:1100px;
margin:auto;
padding-top:120px;
}

h1{
text-align:center;
font-size:70px;
font-weight:900;
margin-bottom:10px;
background:linear-gradient(90deg,#ffffff,#888888);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.slogan{
text-align:center;
color:#aaa;
margin-bottom:30px;
font-size:18px;
}

.card{
background:#111;
border:1px solid #222;
border-radius:35px;
padding:30px;
box-shadow:0 0 25px rgba(255,255,255,0.05);
}

.top-bar{
display:flex;
gap:15px;
margin-bottom:15px;
}

.top-bar select{
flex:1;
}

select{
padding:15px;
border:none;
border-radius:20px;
font-size:16px;
background:white;
}

button{
border:none;
border-radius:20px;
padding:15px;
cursor:pointer;
font-weight:bold;
}

textarea{
width:100%;
height:280px;
border:none;
outline:none;
border-radius:25px;
padding:20px;
font-size:16px;
resize:none;
background:white;
color:black;
}

.resultat{
display:none;
margin-top:25px;
}

.bloc{
background:#111;
padding:25px;
border-radius:25px;
margin-bottom:20px;
border:1px solid #222;
}

.bloc h2{
margin-bottom:15px;
}

.illustration{
font-size:70px;
text-align:center;
margin:20px 0;
}

.calc{
display:none;
margin-top:25px;
background:#111;
border:1px solid #222;
border-radius:25px;
padding:20px;
}

.calc input{
width:100%;
padding:15px;
font-size:24px;
border:none;
border-radius:15px;
margin-bottom:10px;
text-align:right;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
}

.grid button{
padding:15px;
background:white;
}

@media(max-width:700px){

.top-bar{
flex-direction:column;
}

h1{
font-size:50px;
}

.logo{
width:80px;
height:80px;
font-size:12px;
}

}

</style>
</head>
<body>

<div class="logo" onclick="resetSite()">
📚<br>Réviséa
</div>

<button class="calc-btn" onclick="toggleCalc()">
CALC
</button>

<div class="container">

<h1>Réviséa</h1>

<p class="slogan">
Transforme ton cours en résumé et fiche de révision.
</p>

<div class="card">

<div class="top-bar">

<select id="matiere">

<option>Maths</option>
<option>Français</option>
<option>Technologie</option>
<option>Arts plastiques</option>
<option>Histoire-Géographie</option>
<option>SVT</option>
<option>Physique-Chimie</option>
<option>Anglais</option>
<option>Espagnol</option>
<option>Allemand</option>
<option>EMC</option>

</select>

<button onclick="generer()">
✨ Générer
</button>

</div>

<textarea
id="cours"
placeholder="Colle ton cours ici..."
></textarea>

</div>
<div class="calc" id="calc">

<input id="display" readonly>

<div class="grid">

<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>
<button onclick="add('/')">÷</button>
<button onclick="add('Math.PI')">π</button>

<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">6</button>
<button onclick="add('*')">×</button>
<button onclick="add('(')">(</button>

<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>
<button onclick="add('-')">−</button>
<button onclick="add(')')">)</button>

<button onclick="add('0')">0</button>
<button onclick="add('.')">.</button>
<button onclick="calculer()">=</button>
<button onclick="add('+')">+</button>
<button onclick="effacer()">C</button>

<button onclick="add('Math.sin(')">sin</button>
<button onclick="add('Math.cos(')">cos</button>
<button onclick="add('Math.tan(')">tan</button>
<button onclick="add('Math.sqrt(')">√</button>
<button onclick="add('**2')">x²</button>

</div>

</div>

<div class="resultat" id="resultat">

<div class="bloc">

<h2>📝 Résumé</h2>

<p id="resume"></p>

</div>

<div class="bloc">

<h2>📖 Fiche de révision</h2>

<div class="illustration" id="illustration">
📚
</div>

<p id="fiche"></p>

</div>

</div>

</div>
<script>

function resetSite(){

document.getElementById("cours").value = "";
document.getElementById("resume").innerHTML = "";
document.getElementById("fiche").innerHTML = "";
document.getElementById("resultat").style.display = "none";

}

function toggleCalc(){

const calc = document.getElementById("calc");

if(
window.getComputedStyle(calc).display === "none"
){
calc.style.display = "block";
}
else{
calc.style.display = "none";
}

}

function add(valeur){

document.getElementById("display").value += valeur;

}

function effacer(){

document.getElementById("display").value = "";

}

function calculer(){

try{

document.getElementById("display").value =
eval(
document.getElementById("display").value
);

}

catch{

alert("Calcul invalide");

}

}

function generer(){

let texte =
document.getElementById("cours").value.trim();

if(texte.length < 50){

alert("Colle un cours plus complet.");

return;

}

let phrases =
texte
.split(/[.!?]+/)
.filter(
p => p.trim().length > 20
);

let resume =
phrases.slice(0,5).join(". ") + ".";

document.getElementById("resume").innerText =
resume;

let matiere =
document.getElementById("matiere").value;

let illustration = "📚";

if(matiere==="Maths") illustration="📐";
if(matiere==="Français") illustration="📖";
if(matiere==="Technologie") illustration="⚙️";
if(matiere==="Arts plastiques") illustration="🎨";
if(matiere==="Histoire-Géographie") illustration="🌍";
if(matiere==="SVT") illustration="🧬";
if(matiere==="Physique-Chimie") illustration="⚗️";
if(matiere==="Anglais") illustration="🇬🇧";
if(matiere==="Espagnol") illustration="🇪🇸";
if(matiere==="Allemand") illustration="🇩🇪";
if(matiere==="EMC") illustration="⚖️";

document.getElementById("illustration").innerText =
illustration;

let mots =
texte
.toLowerCase()
.match(/\b[a-zàâéèêëîïôûùüç]{5,}\b/g) || [];

let compteur = {};

mots.forEach(mot=>{

compteur[mot] =
(compteur[mot] || 0) + 1;

});

let importants =
Object.entries(compteur)
.sort((a,b)=>b[1]-a[1])
.slice(0,10)
.map(x=>"• "+x[0])
.join("<br>");

document.getElementById("fiche").innerHTML =

"<strong>📚 Matière :</strong> " + matiere +

"<br><br><strong>📝 Résumé :</strong><br>" +
resume +

"<br><br><strong>🧠 Mots-clés :</strong><br>" +
importants +

"<br><br><strong>🎯 À retenir :</strong><br>" +
"• Comprendre les notions principales<br>" +
"• Apprendre les définitions importantes<br>" +
"• Réviser régulièrement<br>" +
"• Faire des exercices";

document.getElementById("resultat").style.display =
"block";

}

</script>

</body>
</html>
