<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Réviséa</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:1000px;
}

h1{
text-align:center;
font-size:55px;
margin-bottom:10px;
}

.slogan{
text-align:center;
color:#aaa;
margin-bottom:30px;
}

.card{
background:#111;
border:1px solid #222;
border-radius:25px;
padding:25px;
}

select{
width:100%;
padding:15px;
border-radius:15px;
border:none;
margin-bottom:15px;
font-size:16px;
background:white;
}

textarea{
width:100%;
height:250px;
border:none;
outline:none;
border-radius:20px;
padding:20px;
font-size:16px;
resize:none;
background:white;
color:black;
}

button{
margin-top:15px;
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.resultat{
display:none;
margin-top:25px;
}

.bloc{
background:#111;
padding:20px;
border-radius:20px;
margin-bottom:20px;
border:1px solid #222;
}

.bloc h2{
margin-bottom:10px;
}

.illustration{
font-size:60px;
text-align:center;
margin:15px 0;
}

</style>
</head>
<body>

<div class="container">

<h1>📚 Réviséa</h1>

<p class="slogan">
Choisis une matière et colle ton cours.
</p>

<div class="card">

<select id="matiere">

<option>Maths</option>
<option>Français</option>
<option>Technologie</option>
<option>Arts plastiques</option>
<option>Histoire-Géographie</option>
<option>SVT</option>
<option>Physique-Chimie</option>
<option>Anglais</option>
<option>Espagnol</option>
<option>Allemand</option>
<option>Éducation musicale</option>
<option>EMC</option>
<option>Latin</option>

</select>

<textarea
id="cours"
placeholder="Colle ton cours ici..."
></textarea>

<button onclick="generer()">
✨ Générer
</button>

</div>

<div class="resultat" id="resultat">

<div class="bloc">

<h2>📝 Résumé</h2>

<p id="resume"></p>

</div>

<div class="bloc">

<h2>📖 Fiche de révision</h2>

<div class="illustration" id="illustration">
📚
</div>

<p id="fiche"></p>

</div>

</div>

</div>

<script>

function generer(){

let texte =
document.getElementById("cours").value.trim();

if(texte.length < 50){

alert("Colle un cours plus complet.");

return;

}

let phrases =
texte
.split(/[.!?]+/)
.filter(
p=>p.trim().length>20
);

let resume =
phrases.slice(0,5).join(". ") + ".";

document.getElementById("resume").innerText =
resume;

let matiere =
document.getElementById("matiere").value;

let illustration = "📚";

if(matiere==="Maths"){
illustration="📐";
}

if(matiere==="Français"){
illustration="📖";
}

if(matiere==="Technologie"){
illustration="⚙️";
}

if(matiere==="Arts plastiques"){
illustration="🎨";
}

if(matiere==="Histoire-Géographie"){
illustration="🌍";
}

if(matiere==="SVT"){
illustration="🧬";
}

if(matiere==="Physique-Chimie"){
illustration="⚗️";
}

if(matiere==="Anglais"){
illustration="🇬🇧";
}

if(matiere==="Espagnol"){
illustration="🇪🇸";
}

if(matiere==="Allemand"){
illustration="🇩🇪";
}

if(matiere==="Éducation musicale"){
illustration="🎵";
}

if(matiere==="EMC"){
illustration="⚖️";
}

if(matiere==="Latin"){
illustration="🏛️";
}

document.getElementById("illustration").innerText =
illustration;

let mots =
texte.toLowerCase().match(/\b[a-zàâéèêëîïôûùüç]{5,}\b/g) || [];

let compteur = {};

mots.forEach(mot=>{
compteur[mot]=(compteur[mot]||0)+1;
});

let importants =
Object.entries(compteur)
.sort((a,b)=>b[1]-a[1])
.slice(0,8)
.map(x=>"• "+x[0])
.join("<br>");

document.getElementById("fiche").innerHTML =

"<strong>📚 Matière :</strong> " + matiere +

"<br><br><strong>📝 Résumé :</strong><br>" +
resume +

"<br><br><strong>🧠 Mots-clés :</strong><br>" +
importants +

"<br><br><strong>🎯 À retenir :</strong><br>" +
"• Comprendre les notions principales<br>" +
"• Relire les définitions importantes<br>" +
"• S'entraîner avec des exercices";

document.getElementById("resultat").style.display =
"block";

}

</script>

</body>
</html>
