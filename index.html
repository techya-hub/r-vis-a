<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Réviséa</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
padding:20px;
min-height:100vh;
}

.logo{
position:fixed;
top:15px;
left:15px;
width:100px;
height:100px;
border-radius:50%;
background:linear-gradient(135deg,#fff,#888);
color:black;
font-weight:bold;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
cursor:pointer;
box-shadow:0 0 20px rgba(255,255,255,0.3);
z-index:999;
}

.calc-btn{
position:fixed;
top:25px;
right:20px;
padding:15px 25px;
border:none;
border-radius:20px;
font-weight:bold;
cursor:pointer;
}

.container{
max-width:1000px;
margin:auto;
padding-top:120px;
}

h1{
text-align:center;
font-size:65px;
margin-bottom:10px;
background:linear-gradient(90deg,#fff,#777);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.slogan{
text-align:center;
color:#aaa;
margin-bottom:30px;
}

.card{
background:#111;
border:1px solid #222;
border-radius:30px;
padding:25px;
}

.top{
display:flex;
gap:10px;
margin-bottom:15px;
}

select{
flex:1;
padding:15px;
border:none;
border-radius:15px;
}

button{
padding:15px;
border:none;
border-radius:15px;
cursor:pointer;
font-weight:bold;
}

textarea{
width:100%;
height:260px;
border:none;
outline:none;
border-radius:20px;
padding:20px;
resize:none;
font-size:16px;
}

.resultat{
display:none;
margin-top:20px;
}

.bloc{
background:#111;
border:1px solid #222;
border-radius:25px;
padding:20px;
margin-bottom:20px;
}

.illustration{
font-size:70px;
text-align:center;
margin:15px 0;
}

.calc{
display:none;
margin-top:20px;
background:#111;
border:1px solid #222;
border-radius:25px;
padding:20px;
}

.calc input{
width:100%;
padding:15px;
margin-bottom:10px;
border-radius:15px;
border:none;
font-size:22px;
text-align:right;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
}

.grid button{
padding:15px;
}

@media(max-width:700px){

.top{
flex-direction:column;
}

.calc-btn{
right:10px;
}

.logo{
width:80px;
height:80px;
font-size:12px;
}

h1{
font-size:45px;
}

}

</style>
</head>
<body>

<div class="logo" onclick="resetSite()">
📚<br>Réviséa
</div>

<button class="calc-btn" onclick="toggleCalc()">
CALC
</button>

<div class="container">

<h1>Réviséa</h1>

<p class="slogan">
Transforme ton cours en résumé et fiche de révision.
</p>

<div class="card">

<div class="top">

<select id="matiere">
<option>Maths</option>
<option>Français</option>
<option>Technologie</option>
<option>Arts plastiques</option>
<option>Histoire-Géographie</option>
<option>SVT</option>
<option>Physique-Chimie</option>
<option>Anglais</option>
<option>Espagnol</option>
<option>Allemand</option>
<option>EMC</option>
</select>

<button onclick="generer()">
✨ Générer
</button>

</div>

<textarea
id="cours"
placeholder="Colle ton cours ici..."
></textarea>

</div>

<div class="calc" id="calc">

<input id="display" readonly>

<div class="grid">

<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>
<button onclick="add('/')">÷</button>
<button onclick="add('Math.PI')">π</button>

<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">6</button>
<button onclick="add('*')">×</button>
<button onclick="add('(')">(</button>

<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>
<button onclick="add('-')">−</button>
<button onclick="add(')')">)</button>

<button onclick="add('0')">0</button>
<button onclick="add('.')">.</button>
<button onclick="calculer()">=</button>
<button onclick="add('+')">+</button>
<button onclick="effacer()">C</button>

<button onclick="add('Math.sin(')">sin</button>
<button onclick="add('Math.cos(')">cos</button>
<button onclick="add('Math.tan(')">tan</button>
<button onclick="add('Math.sqrt(')">√</button>
<button onclick="add('**2')">x²</button>

</div>

</div>

<div class="resultat" id="resultat">

<div class="bloc">

<h2>📝 Résumé</h2>

<p id="resume"></p>

</div>

<div class="bloc">

<h2>📖 Fiche de révision</h2>

<div class="illustration" id="illustration">
📚
</div>

<p id="fiche"></p>

</div>

</div>

</div>

<script>

function resetSite(){

document.getElementById("cours").value="";
document.getElementById("resume").innerHTML="";
document.getElementById("fiche").innerHTML="";
document.getElementById("resultat").style.display="none";

}

function toggleCalc(){

let calc=document.getElementById("calc");

if(calc.style.display==="block"){
calc.style.display="none";
}else{
calc.style.display="block";
}

}

function add(valeur){

document.getElementById("display").value += valeur;

}

function effacer(){

document.getElementById("display").value="";

}

function calculer(){

try{

document.getElementById("display").value =
eval(document.getElementById("display").value);

}

catch{

alert("Calcul invalide");

}

}

function generer(){

let texte =
document.getElementById("cours").value.trim();

if(texte.length < 50){

alert("Colle un cours plus complet.");

return;

}

let phrases =
texte
.split(/[.!?]+/)
.filter(
p=>p.trim().length>20
);

let resume =
phrases.slice(0,5).join(". ") + ".";

document.getElementById("resume").innerText =
resume;

let matiere =
document.getElementById("matiere").value;

let illustration="📚";

if(matiere==="Maths") illustration="📐";
if(matiere==="Français") illustration="📖";
if(matiere==="Technologie") illustration="⚙️";
if(matiere==="Arts plastiques") illustration="🎨";
if(matiere==="Histoire-Géographie") illustration="🌍";
if(matiere==="SVT") illustration="🧬";
if(matiere==="Physique-Chimie") illustration="⚗️";
if(matiere==="Anglais") illustration="🇬🇧";
if(matiere==="Espagnol") illustration="🇪🇸";
if(matiere==="Allemand") illustration="🇩🇪";
if(matiere==="EMC") illustration="⚖️";

document.getElementById("illustration").innerText =
illustration;

let mots =
texte.toLowerCase().match(/\b[a-zàâéèêëîïôûùüç]{5,}\b/g) || [];

let compteur = {};

mots.forEach(mot=>{
compteur[mot]=(compteur[mot]||0)+1;
});

let importants =
Object.entries(compteur)
.sort((a,b)=>b[1]-a[1])
.slice(0,10)
.map(x=>"• "+x[0])
.join("<br>");

document.getElementById("fiche").innerHTML =

"<strong>📚 Matière :</strong> " + matiere +

"<br><br><strong>📝 Résumé :</strong><br>" +
resume +

"<br><br><strong>🧠 Mots-clés :</strong><br>" +
importants +

"<br><br><strong>🎯 À retenir :</strong><br>" +
"• Comprendre les notions importantes<br>" +
"• Retenir les définitions clés<br>" +
"• Réviser régulièrement<br>" +
"• Faire des exercices";

document.getElementById("resultat").style.display =
"block";

}

</script>

</body>
</html>
